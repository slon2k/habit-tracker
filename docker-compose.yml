services:
  aspire-dashboard:
    image: mcr.microsoft.com/dotnet/aspire-dashboard:13
    container_name: aspire-dashboard
    environment:
      DOTNET_DASHBOARD_UNSECURED_ALLOW_ANONYMOUS: "true"
    ports:
      - "18888:18888"
      - "4317:18889"
      - "4318:18890"

  habittracker-api:
    build:
      context: .
      dockerfile: src/HabitTracker.Api/Dockerfile
    container_name: habittracker-api
    depends_on:
      - aspire-dashboard
      - postgres
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080;https://+:8443
      ASPNETCORE_Kestrel__Certificates__Default__Path: /https/habittracker-api.pfx
      ASPNETCORE_Kestrel__Certificates__Default__Password: ${ASPNETCORE_CERT_PASSWORD}
      ConnectionStrings__Database: Host=postgres;Port=5432;Database=habittracker;Username=ht;Password=habittracker
      OTEL_SERVICE_NAME: habittracker-api
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_EXPORTER_OTLP_ENDPOINT: http://aspire-dashboard:18889
    volumes:
      - ${USERPROFILE}/.aspnet/https:/https:ro
    ports:
      - "5000:8080"
      - "5001:8443"

  postgres:
    image: postgres:17
    container_name: habittracker-postgres
    environment:
      POSTGRES_DB: habittracker
      POSTGRES_USER: ht
      POSTGRES_PASSWORD: habittracker
    volumes:
      - ./.docker/postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ht -d habittracker"]
      interval: 10s
      timeout: 5s
      retries: 5
